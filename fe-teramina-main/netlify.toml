[[redirects]]
	from = "/*"
	to = "index.html"
	status = 200

[[headers]]
  for = "/*"
  [headers.values]
		X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "script-src 'self' https://apis.google.com/ https://www.google-analytics.com/ https://www.googletagmanager.com/;"
    Connect-Src = "https://www.google-analytics.com www.google-analytics.com https://stats.g.doubleclick.net;"