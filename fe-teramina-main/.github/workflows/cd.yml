name: CD FE Teramina

on:
  push:
    tags:
      - 'production-*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Create .env file on server
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          echo "VITE_ENDPOINT=${{ secrets.VITE_ENDPOINT }}" > ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_TERAMINA_API_KEY=${{ secrets.VITE_TERAMINA_API_KEY }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_TERAMINA_LLM_API=${{ secrets.VITE_TERAMINA_LLM_API }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_SUMMARY_MODEL=${{ secrets.VITE_SUMMARY_MODEL }}" >> ~/teramina/fe-teramina/.env
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" >> ~/teramina/fe-teramina/.env
          EOF

      - name: Deploy to server
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/fe-teramina/
          git rev-parse HEAD > /tmp/fe_prev_sha
          git pull origin main
          docker-compose down
          docker-compose up -d --build
          EOF

      - name: Health check with rollback
        run: |
          echo "Waiting for container to be ready..."
          sleep 15
          if curl --fail --silent --show-error \
                  --retry 5 --retry-delay 5 --retry-connrefused \
                  http://${{ secrets.SSH_HOST }}/; then
            echo "Health check passed."
          else
            echo "Health check failed — rolling back to previous commit."
            ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ROLLBACK'
            set -e
            cd ~/teramina/fe-teramina/
            git checkout main
            git reset --hard $(cat /tmp/fe_prev_sha)
            docker-compose down
            docker-compose up -d --build
            ROLLBACK
            echo "Rollback deployed. Failing job."
            exit 1
          fi
