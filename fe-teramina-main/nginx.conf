server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # HTTPS redirect when behind a TLS-terminating proxy (set X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    # Defined at server level so all location blocks inherit them.
    # Location blocks that define their own add_header MUST repeat these
    # (nginx: a child add_header resets the parent's headers).
    add_header X-Frame-Options          "DENY"                             always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups"        always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # style-src unsafe-inline: required for MUI/emotion injected styles
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    # ─────────────────────────────────────────────────────────────────────────

    location = /api/provinsi.json {
        try_files $uri =404;
    }

    location ^~ /api/kabupaten/ {
        try_files $uri =404;
    }

    location ^~ /api/kecamatan/ {
        try_files $uri =404;
    }

    location ^~ /api/kelurahan/ {
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri /index.html;
        # no add_header here — inherits all security headers from server block
    }

    # Static assets — long cache via expires (does NOT reset add_header inheritance)
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff2|woff|ttf|otf|eot|mp4|webm|ogg|mp3|wav|flac|aac)$ {
        try_files $uri =404;
        expires max;
        access_log off;
        # no add_header here — expires directive does not reset inheritance
    }

    # Service worker must never be cached
    # This block uses add_header, so it MUST repeat the security headers
    location = /registerSW.js {
        expires -1;
        add_header Cache-Control           "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups"       always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control           "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups"       always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    error_page 404 /index.html;
}
