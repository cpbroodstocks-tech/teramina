name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      service:
        description: "Service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
      run_commercial_seed:
        description: "Run seed_commercial_layer after backend deploy"
        required: false
        default: false
        type: boolean
      reindex_advisory_sources:
        description: "Run reindex_advisory_sources after backend deploy"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "production-*"

permissions:
  contents: read

jobs:
  backend:
    name: Backend Deploy
    if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Write backend environment on server
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/core-be-teramina-main/
          mkdir -p secrets
          chmod 700 secrets
          cat > secrets/firebase-admin-sdk.json << 'FIREBASEEOF'
          ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASEEOF
          cat > secrets/google-application-credentials.json << 'GOOGLEEOF'
          ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLEEOF
          chmod 600 secrets/firebase-admin-sdk.json
          chmod 600 secrets/google-application-credentials.json
          cat > .env << 'ENVEOF'
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG=False
          DJANGO_SECURE_SSL_REDIRECT=${{ secrets.DJANGO_SECURE_SSL_REDIRECT }}
          DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          FIREBASE_CREDENTIALS_JSON=
          FIREBASE_CREDENTIALS_PATH=/run/secrets/teramina/firebase-admin-sdk.json
          GOOGLE_APPLICATION_CREDENTIALS_JSON=
          GOOGLE_APPLICATION_CREDENTIALS=${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON != '' && '/run/secrets/teramina/google-application-credentials.json' || '' }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          open_ai_key=${{ secrets.OPENAI_API_KEY }}
          TERAMINA_LLM_API=${{ secrets.TERAMINA_LLM_API }}
          TERAMINA_API_KEY=${{ secrets.TERAMINA_API_KEY }}
          SUMMARY_MODEL=${{ secrets.SUMMARY_MODEL }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX=${{ secrets.PINECONE_INDEX }}
          GS_BUCKET_NAME=${{ secrets.GS_BUCKET_NAME }}
          GS_PROJECT_ID=${{ secrets.GS_PROJECT_ID }}
          GS_VDB_BUCKET_NAME=${{ secrets.GS_VDB_BUCKET_NAME }}
          CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
          CACHE_REDIS_URL=${{ secrets.CACHE_REDIS_URL }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          DATA_UPLOAD_MAX_MB=${{ secrets.DATA_UPLOAD_MAX_MB }}
          FILE_UPLOAD_MAX_MB=${{ secrets.FILE_UPLOAD_MAX_MB }}
          ENVEOF
          EOF

      - name: Deploy backend
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/
          git rev-parse HEAD > /tmp/teramina_be_prev_sha
          git checkout main
          git pull --ff-only origin main
          cd core-be-teramina-main/
          docker-compose down
          docker-compose up -d --build
          EOF

      - name: Seed commercial layer
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_commercial_seed == 'true' }}
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/core-be-teramina-main/
          docker-compose exec -T web python manage.py seed_commercial_layer
          EOF

      - name: Reindex advisory sources
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reindex_advisory_sources == 'true' }}
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/core-be-teramina-main/
          docker-compose exec -T web python manage.py reindex_advisory_sources
          EOF

      - name: Backend health check with rollback
        run: |
          sleep 20
          if curl --fail --silent --show-error \
                  --retry 6 --retry-delay 5 --retry-connrefused \
                  http://${{ secrets.SSH_HOST }}:8000/health/; then
            echo "Backend health check passed."
          else
            echo "Backend health check failed; rolling back."
            ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/teramina/core-be-teramina-main/; docker-compose ps; docker-compose logs --tail=120 web" || true
            ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "set -e; cd ~/teramina/; git checkout main; git reset --hard \$(cat /tmp/teramina_be_prev_sha); cd core-be-teramina-main/; docker-compose down; docker-compose up -d --build"
            exit 1
          fi

  frontend:
    name: Frontend Deploy
    if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: fe-teramina-main/yarn.lock

      - name: Build frontend artifact
        working-directory: fe-teramina-main
        env:
          VITE_ENDPOINT: ${{ secrets.VITE_ENDPOINT }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_SUMMARY_MODEL: ${{ secrets.VITE_SUMMARY_MODEL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          HUSKY: 0
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile
          yarn build
          tar -czf ../frontend-dist.tgz dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Upload frontend artifact
        run: scp -o ServerAliveInterval=30 -o ServerAliveCountMax=120 frontend-dist.tgz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/teramina-frontend-dist.tgz

      - name: Write frontend environment on server
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/fe-teramina-main/
          cat > .env << 'ENVEOF'
          VITE_ENDPOINT=${{ secrets.VITE_ENDPOINT }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_SUMMARY_MODEL=${{ secrets.VITE_SUMMARY_MODEL }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          VITE_GA_MEASUREMENT_ID=${{ secrets.VITE_GA_MEASUREMENT_ID }}
          ENVEOF
          EOF

      - name: Deploy frontend
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/
          git rev-parse HEAD > /tmp/teramina_fe_prev_sha
          git checkout main
          git pull --ff-only origin main
          cd fe-teramina-main/
          if [ -d dist ]; then tar -czf /tmp/teramina_fe_prev_dist.tgz dist; else rm -f /tmp/teramina_fe_prev_dist.tgz; fi
          rm -rf dist
          tar -xzf /tmp/teramina-frontend-dist.tgz
          docker-compose down
          docker-compose up -d
          rm -f /tmp/teramina-frontend-dist.tgz
          EOF

      - name: Frontend health check with rollback
        run: |
          sleep 15
          if curl --fail --silent --show-error \
                  --retry 5 --retry-delay 5 --retry-connrefused \
                  http://${{ secrets.SSH_HOST }}/; then
            echo "Frontend health check passed."
          else
            echo "Frontend health check failed; rolling back."
            ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "set -e; cd ~/teramina/; git checkout main; git reset --hard \$(cat /tmp/teramina_fe_prev_sha); cd fe-teramina-main/; rm -rf dist; if [ -f /tmp/teramina_fe_prev_dist.tgz ]; then tar -xzf /tmp/teramina_fe_prev_dist.tgz; fi; docker-compose down; docker-compose up -d"
            exit 1
          fi
