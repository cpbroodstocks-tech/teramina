name: Diagnose

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  backend:
    name: Backend Diagnostics
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Inspect backend
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/core-be-teramina-main/

          echo "== docker-compose ps =="
          docker-compose ps

          echo "== backend env/file checks =="
          docker-compose exec -T web python - << 'PY'
          import os

          firebase_path = os.getenv("FIREBASE_CREDENTIALS_PATH")
          google_path = os.getenv("GOOGLE_APPLICATION_CREDENTIALS")
          checks = {
              "JWT_SECRET_KEY_set": bool(os.getenv("JWT_SECRET_KEY")),
              "MONGODB_URI_set": bool(os.getenv("MONGODB_URI")),
              "FIREBASE_CREDENTIALS_JSON_set": bool(os.getenv("FIREBASE_CREDENTIALS_JSON")),
              "FIREBASE_CREDENTIALS_PATH": firebase_path,
              "GOOGLE_APPLICATION_CREDENTIALS_set": bool(google_path),
              "SEEDER_FARM_set": bool(os.getenv("SEEDER_FARM")),
              "SEEDER_POND_set": bool(os.getenv("SEEDER_POND")),
              "SEEDER_CYCLE_set": bool(os.getenv("SEEDER_CYCLE")),
          }
          for key, value in checks.items():
              print(f"{key}={value}")

          for label, path in [("firebase", firebase_path), ("google", google_path)]:
              if not path:
                  continue
              try:
                  with open(path, "rb") as handle:
                      handle.read(1)
                  print(f"{label}_credentials_readable=True")
              except Exception as exc:  # pylint: disable=broad-except
                  print(f"{label}_credentials_readable=False error={type(exc).__name__}: {exc}")
          PY

          echo "== dashboard readiness =="
          docker-compose exec -T web python manage.py shell -c "
          from teramina.user.models.user_model import User
          from teramina.farm.models.farm_model import Farm
          from teramina.pond.models.pond_model import Pond
          from teramina.cycle.models.cycle_model import Cycle
          from teramina.cycle_data.models.cycle_data_model import CycleData, ResultData
          from teramina.dashboard.services.filter_service import FilterData
          from teramina.dashboard.services.historical.economic import DashboardEconomic
          from teramina.dashboard.services.historical.feed import DashboardFeed
          from teramina.dashboard.services.readiness import is_dashboard_ready_cycle
          from teramina.helpers.default_data_updater import user_has_dashboard_data
          from teramina.water_quality_dashboard.services.water_quality_service import WaterQuality

          for user in User.objects.only('id', 'email', 'is_there_data'):
              user_id = str(user.id)
              print({'user': user.email, 'cached_status': user.is_there_data, 'dashboard_ready': user_has_dashboard_data(user_id)})
              for farm in Farm.objects(user_id=user_id).only('id', 'name'):
                  for pond in Pond.objects(farm_id=str(farm.id)).only('id', 'name'):
                      for cycle in Cycle.objects(pond_id=str(pond.id)).only('id', 'name'):
                          cycle_id = str(cycle.id)
                          cycle_data = CycleData.objects(cycle_id=cycle_id).only('result_data').first()
                          result_data = ResultData.objects(cycle_id=cycle_id).only('result_data').first()
                          ready = is_dashboard_ready_cycle(cycle_id)
                          filter_status, filter_response = FilterData(user_id).filter(str(farm.id), str(pond.id), cycle_id, 'historical')
                          date_range = filter_response.payload[0].get('daterange') if filter_status == 200 else filter_response.message
                          end_date = date_range.get('end_date') if isinstance(date_range, dict) else None
                          economics_status = DashboardEconomic(str(farm.id), str(pond.id), cycle_id, end_date).economic()[0] if end_date else None
                          feeding_status = DashboardFeed(str(farm.id), str(pond.id), cycle_id, end_date).feed()[0] if end_date else None
                          wq_filter_status, wq_filter_response = FilterData(user_id).wq_filter(str(farm.id), str(pond.id), cycle_id)
                          wq_data = wq_filter_response.payload[0].get('data') if wq_filter_status == 200 and wq_filter_response.payload else {}
                          wq_status = WaterQuality().get_water_quality_data(cycle_id, wq_data.get('start_date'), wq_data.get('end_date'), 'wqi_1')[0] if wq_data else None
                          print({'farm_id': str(farm.id), 'pond_id': str(pond.id), 'cycle_id': cycle_id, 'cycle': cycle.name, 'cycle_rows': len(cycle_data.result_data) if cycle_data else 0, 'result_rows': len(result_data.result_data) if result_data else 0, 'ready': ready, 'filter_status': filter_status, 'economics_status': economics_status, 'feeding_status': feeding_status, 'wq_filter_status': wq_filter_status, 'wq_status': wq_status, 'wq_variables': wq_data.get('variables', []), 'daterange': date_range})
          "

          echo "== recent web logs =="
          docker-compose logs --tail=300 web
          EOF
