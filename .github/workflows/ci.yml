name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe-teramina-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: fe-teramina-main/.nvmrc
          cache: yarn
          cache-dependency-path: fe-teramina-main/yarn.lock
      - run: yarn install --frozen-lockfile
        env:
          HUSKY: 0
      - run: yarn lint
      - run: yarn test
      - run: yarn build
        env:
          VITE_ENDPOINT: http://127.0.0.1:8000/api

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-be-teramina-main
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DJANGO_SECRET_KEY: ci-django-secret-value-with-more-than-fifty-characters-for-checks
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      JWT_SECRET_KEY: ci-jwt-secret-value-with-more-than-fifty-characters-for-checks
      MONGODB_URI: mongodb://localhost:27017/teramina?directConnection=true
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: core-be-teramina-main/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install pytest mongomock
      - run: python -m pytest -q
      - run: python manage.py check --deploy
