name: CD BE Teramina

on:
  push:
    tags:
      - 'production-*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Write .env on server
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cat > ~/teramina/core-be-teramina/.env << 'ENVEOF'
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GS_BUCKET_NAME=${{ secrets.GS_BUCKET_NAME }}
          GS_PROJECT_ID=${{ secrets.GS_PROJECT_ID }}
          CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          ENVEOF
          EOF

      - name: Deploy to server
        run: |
          ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ~/teramina/core-be-teramina/
          git rev-parse HEAD > /tmp/be_prev_sha
          git pull origin main
          docker-compose down
          docker-compose up -d --build
          EOF

      - name: Health check with rollback
        run: |
          echo "Waiting for container to be ready..."
          sleep 20
          if curl --fail --silent --show-error \
                  --retry 6 --retry-delay 5 --retry-connrefused \
                  http://${{ secrets.SSH_HOST }}:8000/health/; then
            echo "Health check passed."
          else
            echo "Health check failed — rolling back to previous commit."
            ssh -o ServerAliveInterval=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ROLLBACK'
            set -e
            cd ~/teramina/core-be-teramina/
            git checkout main
            git reset --hard $(cat /tmp/be_prev_sha)
            docker-compose down
            docker-compose up -d --build
            ROLLBACK
            echo "Rollback deployed. Failing job."
            exit 1
          fi
