name: CI BE Teramina

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-django-secret-not-for-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      JWT_SECRET_KEY: ci-jwt-secret
      MONGOATLAS_USER: test
      MONGOATLAS_PASSWORD: test
      MONGOATLAS_HOST: localhost
      MONGOATLAS_DATABASE: test_db
      GS_BUCKET_NAME: test-bucket
      GS_PROJECT_ID: test-project
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: "cache+memory://"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest-cov

      - name: Pylint
        run: |
          pylint --load-plugins pylint.extensions.docparams \
                 --disable=C,R,W0611 \
                 $(git ls-files '*.py' | grep -v migrations | grep -v .venv)

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Django system check
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS"
