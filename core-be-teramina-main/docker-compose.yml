version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - gcs-credentials:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: unless-stopped
    command: celery -A teramina worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - gcs-credentials:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A teramina inspect ping --destination celery@$${HOSTNAME} >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    build: .
    restart: unless-stopped
    command: celery -A teramina beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile=/tmp/celerybeat.pid
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gcs-credentials:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /secrets/teramina  # create this dir on server; place gcs-sa.json inside
